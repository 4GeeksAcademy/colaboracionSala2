  <section class="contact-section">
    <div class="container">
      <h1 class="contact-title">Contact</h1>

      <p class="contact-text">
        Donec ullamcorper nulla non metus auctor fringilla. Vestibulum id ligula porta felis
        euismod semper. Praesent commodo cursus magna, vel scelerisque nisl consectetur.
        Fusce dapibus, tellus ac cursus commodo.
      </p>

      <div class="contact-box">
        <form>
          <div class="row mb-3 align-items-start">
            <div class="col-md-3">
              <label for="email" class="col-form-label form-label-custom w-100">Your E-mail</label>
            </div>
            <div class="col-md-9">
              <input
                type="email"
                class="form-control form-control-lg"
                id="email"
                placeholder="Your email"
              />
            </div>
          </div>

          <div class="row mb-3 align-items-start">
            <div class="col-md-3">
              <label for="message" class="col-form-label form-label-custom w-100">Your message</label>
            </div>
            <div class="col-md-9">
              <textarea
                class="form-control form-control-lg"
                id="message"
                placeholder="Please enter your message here..."
              ></textarea>
            </div>
          </div>

          <div class="row">
            <div class="col-md-9 offset-md-3 text-end">
              <button type="submit" class="btn btn-primary btn-submit">Submit</button>
            </div>
          </div>
        </form>
      </div>
    </div>
  </section>
